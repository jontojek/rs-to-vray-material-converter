<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRay ↔ RS Material Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:       #111214;
    --bg2:      #16181c;
    --bg3:      #1c1f24;
    --border:   #2a2d33;
    --border2:  #363a42;
    --rs:       #e8622a;
    --vray:     #3a8fd4;
    --text:     #c8cdd6;
    --text-dim: #5a6072;
    --text-hi:  #eef0f4;
    --green:    #4caf7d;
    --yellow:   #d4a843;
    --purple:   #9b6fd4;
    --red:      #d45a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    height: 44px;
    gap: 14px;
  }
  .header-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .header-logo .rs { color: var(--rs); }
  .header-logo .vr { color: var(--vray); }

  .dir-toggle {
    display: flex;
    align-items: center;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .dir-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    padding: 5px 12px;
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .dir-btn.d-vr { color: var(--vray); }
  .dir-btn.d-rs { color: var(--rs); }
  .dir-btn.active { background: var(--bg); color: var(--text-hi); }
  .dir-sep { width: 1px; background: var(--border2); height: 28px; flex-shrink: 0; }

  .phase-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: #1a3d26;
    color: var(--green);
    border-radius: 2px;
    padding: 2px 6px;
    margin-left: auto;
  }
  .header-right {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .body { display: flex; height: calc(100vh - 44px); }

  .sidebar {
    width: 236px;
    min-width: 236px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .sidebar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 14px 14px 6px;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 14px;
    background: none;
    border: none;
    border-left: 2px solid transparent;
    width: 100%;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    transition: background 0.1s;
    white-space: nowrap;
  }
  .nav-btn:hover  { background: var(--bg3); }
  .nav-btn.active { background: var(--bg3); color: var(--text-hi); border-left-color: var(--vray); }
  .nav-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: var(--vray); }
  .nav-count {
    margin-left: auto;
    font-size: 9px;
    color: var(--text-dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0 4px;
    min-width: 18px;
    text-align: center;
  }
  .sidebar-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .stat-line { font-family:'IBM Plex Mono',monospace; font-size:10px; margin-bottom:3px; padding: 0 14px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 42px;
    flex-shrink: 0;
  }
  .shader-id { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; }
  .shader-id.vray { color: var(--vray); }
  .shader-id.rs   { color: var(--rs); }
  .arrow { color: var(--text-dim); font-size: 14px; }
  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .search-wrap { position: relative; }
  .search-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 10px 5px 26px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    width: 190px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--border2); }
  .search-input::placeholder { color: var(--text-dim); }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 11px; pointer-events: none; }

  .filter-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 9px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.12s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.f-invert.active { color: var(--yellow); border-color: var(--border2); background: var(--bg2); }
  .filter-btn.f-manual.active { color: var(--purple); border-color: var(--border2); background: var(--bg2); }
  .filter-btn.f-na.active     { color: var(--red);    border-color: var(--border2); background: var(--bg2); }

  .table-wrap { flex: 1; overflow-y: auto; }
  .table-wrap::-webkit-scrollbar { width: 5px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--bg2); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .section { border-bottom: 1px solid var(--border); }
  .section-hdr {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 20px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .section-hdr:hover { background: #1f2229; }
  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .section-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0 4px;
  }
  .chevron { margin-left: auto; color: var(--text-dim); font-size: 10px; transition: transform 0.18s; }
  .section.collapsed .chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  .param-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .param-table thead th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 5px 16px;
    text-align: left;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .th-src   { width: 20%; }
  .th-type  { width: 7%; }
  .th-tgt   { width: 21%; }
  .th-notes { width: 52%; }

  .param-row { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .param-row:hover { background: var(--bg3); }
  .param-row.hidden { display: none; }
  .param-table td { padding: 8px 16px; vertical-align: top; line-height: 1.55; overflow: hidden; }

  .col-src  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; }
  .col-type { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .col-tgt  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; }
  .col-notes { font-size: 11.5px; color: var(--text); line-height: 1.6; }

  .vray-color { color: var(--vray); }
  .rs-color   { color: var(--rs); }

  .tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 2px;
    padding: 1px 5px;
    margin-right: 5px;
    vertical-align: middle;
    white-space: nowrap;
  }
  .tag-exact  { background: #1a3d26; color: var(--green); }
  .tag-invert { background: #2d2616; color: var(--yellow); }
  .tag-manual { background: #2a1f3d; color: var(--purple); }
  .tag-na     { background: #2d1a1a; color: var(--red); }

  .formula {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 2px;
    padding: 1px 6px;
    margin-top: 3px;
    color: var(--yellow);
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 7px 20px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .legend-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo"><span class="vr">VRay</span> ↔ <span class="rs">RS</span> &nbsp;Material Reference</div>
  <div class="dir-toggle">
    <button class="dir-btn d-vr active" id="btn-vr" onclick="setDir('vr')">VRayMtl → RS Standard</button>
    <div class="dir-sep"></div>
    <button class="dir-btn d-rs" id="btn-rs" onclick="setDir('rs')">RS Standard → VRayMtl</button>
  </div>
  <div class="phase-badge">Phase 1 · Docs-Verified</div>
  <div class="header-right">v0.4</div>
</div>

<div class="body">
  <div class="sidebar">
    <div class="sidebar-label">Sections</div>
    <div id="nav-links"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Stats</div>
    <div style="padding:4px 0 14px;">
      <div class="stat-line" id="s-total"  style="color:var(--text-dim);">—</div>
      <div class="stat-line" id="s-exact"  style="color:var(--green);">—</div>
      <div class="stat-line" id="s-invert" style="color:var(--yellow);">—</div>
      <div class="stat-line" id="s-manual" style="color:var(--purple);">—</div>
      <div class="stat-line" id="s-na"     style="color:var(--red);">—</div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span class="shader-id vray" id="lbl-src">VRayMtl</span>
      <span class="arrow">→</span>
      <span class="shader-id rs"   id="lbl-tgt">RS Standard Material</span>
      <div class="toolbar-right">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" type="text" id="search" placeholder="Search parameters…" oninput="applyFilters()">
        </div>
        <button class="filter-btn f-invert" id="f-invert" onclick="toggleFilter('invert')">Inverted</button>
        <button class="filter-btn f-manual" id="f-manual" onclick="toggleFilter('manual')">Manual</button>
        <button class="filter-btn f-na"     id="f-na"     onclick="toggleFilter('na')">No Equiv</button>
      </div>
    </div>
    <div class="table-wrap" id="table-wrap"></div>
    <div class="legend">
      <span class="legend-lbl">Key:</span>
      <div class="legend-item"><span class="tag tag-exact">Exact</span>Direct 1:1 mapping</div>
      <div class="legend-item"><span class="tag tag-invert">Invert</span>Roughness ↔ Glossiness (1−x)</div>
      <div class="legend-item"><span class="tag tag-manual">Manual</span>Requires workflow change</div>
      <div class="legend-item"><span class="tag tag-na">N/A</span>No equivalent in target renderer</div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// MAPPING DATA v0.4 — sourced directly from:
//   docs/vray/vray_vraymtl.md  (Chaos V-Ray for Maya documentation)
//   docs/redshift/redshift_standard_material.md  (Maxon RS documentation)
//
// VRayMtl is the authoritative starting point.
// Rows with vray='(no equivalent)' are RS-only parameters — visible in RS→VRay mode.
// tag: exact | invert | manual | na
// ─────────────────────────────────────────────────────────────────────────────

const SECTIONS = [

  { id:'diffuse', title:'Diffuse', rows:[
    { vray:'Diffuse Color',       type:'color', rs:'Base Color',
      tag:'exact',
      notes:'Direct equivalent. Both represent surface albedo for dielectrics and surface color for metals. Diffuse is dimmed by the reflection layer above via energy conservation in both renderers.' },
    { vray:'Amount (Diffuse)',    type:'float', rs:'Base Weight',
      tag:'exact',
      notes:'Global multiplier on diffuse/base color. 0–1 in both. Direct mapping.' },
    { vray:'Metalness',           type:'float', rs:'Metalness',
      tag:'exact',
      notes:'0–1 range. Both treat intermediate values as non-physical — use 0 (dielectric) or 1 (metal) in production. In both, metalness derives reflectance from the base/diffuse color.' },
    { vray:'Roughness Amount',    type:'float', rs:'Diffuse Roughness',
      tag:'exact',
      notes:'Both implement Oren-Nayar diffuse retroreflection. Higher values = more matte, retroreflective. Direct mapping.' },
    { vray:'Opacity Map',         type:'tex',   rs:'Opacity',
      tag:'exact',
      notes:'White=opaque, black=transparent in both. VRay adds Opacity Mode (Clip / Stochastic). RS Standard Material opacity is always filtered/stochastic.' },
    { vray:'Opacity Mode',        type:'enum',  rs:'(RS Sprite node for Clip)',
      tag:'manual',
      notes:'VRay Clip mode = hard cutout at 50% threshold. RS equivalent is the separate RS Sprite node — it is not a flag on the Standard Material. RS Standard Material opacity is always stochastic.' },
    { vray:'Self-Illumination',   type:'color', rs:'Emission Color',
      tag:'exact',
      notes:'Direct equivalent. Both support texture connections.' },
    { vray:'Self-Illumination GI', type:'bool', rs:'(RS emission always affects GI)',
      tag:'na',
      notes:'VRay toggle for whether self-illumination affects GI rays. RS emission always contributes to GI with no disable option. Converting RS→VRay: enable Self-Illumination GI to match default RS behavior.' },
    { vray:'Compensate Exposure', type:'bool',  rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Adjusts emission intensity to compensate for VRayPhysicalCamera exposure settings. No RS equivalent — RS emission brightness is absolute.' },
    { vray:'Double-Sided',        type:'bool',  rs:'(RS Object Tag)',
      tag:'manual',
      notes:'VRay shades back faces with the same material. In RS this is per-object in the RS Object Tag, not the material. Transfer this flag to the mesh Object Tag when converting.' },
  ]},

  { id:'reflection', title:'Reflection / Specular', rows:[
    { vray:'Reflection Color',    type:'color', rs:'Reflection Color',
      tag:'exact',
      notes:'Both tint the reflection and simultaneously dim diffuse via energy conservation. For dielectrics keep white; for metals use the characteristic metal color.' },
    { vray:'Amount (Reflection)', type:'float', rs:'Reflection Weight',
      tag:'exact',
      notes:'Direct multiplier on reflection strength. VRay: Amount. RS: Reflection Weight. Both 0–1. Direct mapping.' },
    { vray:'Reflection Glossiness', type:'float', rs:'Reflection Roughness',
      tag:'invert',
      notes:'Opposite conventions. VRay: 1.0=mirror, lower=blurry. RS: 0.0=mirror, higher=blurry. Enable "Use Roughness" in VRayMtl to work in roughness space directly and skip the inversion.',
      formula:'RS Roughness = 1 − VRay Glossiness' },
    { vray:'Use Roughness',       type:'bool',  rs:'(RS always uses roughness)',
      tag:'manual',
      notes:'VRay toggle to flip Reflection Glossiness to roughness convention. RS Standard Material always works in roughness space. If Use Roughness is OFF in VRay, apply the inversion formula. If ON, values transfer directly.' },
    { vray:'Use Fresnel',         type:'bool',  rs:'Fresnel Type (Schlick/Scientific)',
      tag:'manual',
      notes:'VRay requires a checkbox to enable Fresnel. RS always uses Fresnel — it cannot be disabled, only the model can be switched (Schlick = fast approximation, Scientific = full IOR-based). Approximating VRay with Use Fresnel off: set a high IOR in RS and adjust Reflection Weight manually.' },
    { vray:'Fresnel IOR',         type:'float', rs:'IOR',
      tag:'exact',
      notes:'Direct equivalent when VRay Use Fresnel is on and RS Fresnel Type is Scientific. Water=1.33, glass=1.5, diamond=2.4. Note: RS uses one IOR for both Fresnel reflection and refraction. VRay can decouple these via Lock Fresnel IOR To Refraction IOR.' },
    { vray:'BRDF Type',           type:'enum',  rs:'(GGX only)',
      tag:'manual',
      notes:'VRay offers Phong, Blinn, Ward, GGX. RS Standard Material uses GGX exclusively. When converting Phong/Blinn/Ward from VRay→RS, switch to GGX and tune Roughness to approximate the original highlight shape.' },
    { vray:'GGX Tail Falloff',    type:'float', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Controls the GGX highlight-to-non-highlight transition. RS uses fixed GGX tail behavior. Leave at VRay default (2.0) for cross-renderer use.' },
    { vray:'Anisotropy',          type:'float', rs:'Anisotropy',
      tag:'exact',
      notes:'Both: 0=isotropic, ±values=elongated highlight. VRay range −0.999 to 0.999, RS −1 to +1. Direct mapping.' },
    { vray:'Anisotropy Rotation', type:'float', rs:'Anisotropy Rotation',
      tag:'exact',
      notes:'Both use 0–1 normalized range (0=0°, 1=360°). Direct mapping.' },
    { vray:'UV Vectors / Local Axis', type:'enum', rs:'Anisotropy Orientation',
      tag:'manual',
      notes:'Both support UV-based and world-space anisotropy derivation. VRay: Local Axis (X/Y/Z) or UVW generator. RS: UV, World Space, or Reference Vector. Map UV→UV, world-space→world-space. Specific axis values require manual re-entry.' },
    { vray:'Max Depth (Reflection)', type:'int', rs:'Max Trace Depth (Reflection)',
      tag:'exact',
      notes:'Maximum reflection ray bounces. VRay: Reflection Advanced. RS: Optimizations > Reflection > enable Trace Depth Override. Direct equivalent.' },
    { vray:'Dim Distance',        type:'float', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Stops tracing reflection rays beyond a world-space distance. No RS equivalent.' },
    { vray:'Dim Fall Off',        type:'float', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Falloff radius for Dim Distance. No RS equivalent.' },
    { vray:'Reflect On Back Side', type:'bool', rs:'(RS Object Tag / double-sided geo)',
      tag:'manual',
      notes:'VRay per-material back-face reflection toggle. RS handles this at the object level via the RS Object Tag or double-sided geometry.' },
    { vray:'Affect Channels',     type:'enum',  rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only (Color Only / Color+Alpha / All Channels). Controls which render channels reflections write into. No RS material-level equivalent — handled at the RS render pass level.' },
  ]},

  { id:'thinfilm', title:'Thin Film', rows:[
    { vray:'Enable Thin Film',    type:'bool',  rs:'Thin Film Weight',
      tag:'manual',
      notes:'VRay: checkbox (on/off). RS: float weight (0–1). Converting VRay enabled=RS weight 1.0, disabled=0.0. RS allows partial blend which has no VRay equivalent.' },
    { vray:'Min Thickness (nm)',  type:'float', rs:'Thin Film Thickness',
      tag:'exact',
      notes:'Both in nanometers. When no Thickness Blend map is used in VRay, Min Thickness is the only value — maps directly to RS Thin Film Thickness. Typical iridescence range: 300–800nm.' },
    { vray:'Max Thickness (nm)',  type:'float', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Upper thickness bound when a Thickness Blend map is connected. RS has a single thickness value — bake or average the VRay Min/Max range, or drive RS Thin Film Thickness with a texture map directly.' },
    { vray:'Thickness Blend',     type:'tex',   rs:'(map directly to Thin Film Thickness)',
      tag:'manual',
      notes:'VRay uses Thickness Blend to interpolate between Min and Max Thickness across the surface. RS accepts a texture on Thin Film Thickness directly — connect the same map, but the Min/Max remapping must be baked into the texture or handled via a RS color correction node upstream.' },
    { vray:'IOR (Thin Film)',     type:'float', rs:'Thin Film IOR',
      tag:'exact',
      notes:'Direct equivalent. Both control the thin film refractive index. Typical value: 1.5 (oil film on water).' },
  ]},

  { id:'coat', title:'Clear Coat', rows:[
    { vray:'Amount (Coat)',       type:'float', rs:'Coat Weight',
      tag:'exact',
      notes:'Direct equivalent. 0=no coat, 1=full coat.' },
    { vray:'Coat Color',          type:'color', rs:'Coat Color',
      tag:'exact',
      notes:'Tints underlying layers (reflection, sheen, diffuse, refraction) but NOT the coat specular highlight (always white at normal incidence in both). Direct equivalent.' },
    { vray:'Coat Glossiness',     type:'float', rs:'Coat Roughness',
      tag:'invert',
      notes:'Opposite conventions. VRay: 1.0=glass-like, lower=blurry. RS: 0.0=glass-like, higher=blurry. Formula below.',
      formula:'RS Coat Roughness = 1 − VRay Coat Glossiness' },
    { vray:'IOR (Coat)',          type:'float', rs:'Coat IOR',
      tag:'exact',
      notes:'Direct equivalent. Default 1.5 = typical clear coat (acrylic lacquer).' },
    { vray:'Darkening',           type:'float', rs:'Coat Affect Color',
      tag:'manual',
      notes:'Both control how the coat layer absorbs and darkens underlying layers (simulating lacquer depth). Similar intent, different scale and parametrization — match by visual result.' },
    { vray:'Coat Anisotropy',     type:'float', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Independent anisotropy for the coat highlight. RS coat layer is always isotropic regardless of base anisotropy.' },
    { vray:'Coat Anisotropy Rotation', type:'float', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Orientation of coat anisotropic highlight. No RS equivalent.' },
    { vray:'Bump Map (Coat)',     type:'tex',   rs:'Coat Normal',
      tag:'exact',
      notes:'Both support an independent bump/normal map for the coat layer, separate from the base bump. Direct equivalent.' },
    { vray:'Bump Map Type (Coat)', type:'enum', rs:'Normal Type (Coat)',
      tag:'exact',
      notes:'Both expose tangent/object/world-space normal map types for the coat. Direct mapping.' },
    { vray:'Coat Bump Mult',      type:'float', rs:'(control via upstream map)',
      tag:'manual',
      notes:'VRay has an explicit coat bump multiplier. RS has no dedicated coat bump multiplier — control strength via the map level or an upstream RS color correction node.' },
    { vray:'Lock Coat Bump to Base Bump', type:'bool', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Forces base bump to override coat bump. RS always evaluates coat and base normals independently.' },
    { vray:'(no equivalent)',     type:'—',     rs:'Coat Affect Roughness',
      tag:'na',
      notes:'RS-only. Controls how much the coat layer adds roughness to the underlying base — simulating micro-scratches under the coat. VRayMtl has no equivalent. Converting RS→VRay: approximate by manually increasing base Reflection Glossiness (lowering glossiness).' },
  ]},

  { id:'refraction', title:'Transmission / Refraction', rows:[
    { vray:'Refraction Color',    type:'color', rs:'Transmission Color',
      tag:'manual',
      notes:'Both tint transmitted light. VRay Refraction Color encodes both amount (brightness) and tint simultaneously. RS separates them into Transmission Weight and Transmission Color. Converting VRay→RS: extract the Value channel of VRay Refraction Color → RS Transmission Weight; hue/saturation → RS Transmission Color.' },
    { vray:'Amount (Refraction)', type:'float', rs:'Transmission Weight',
      tag:'manual',
      notes:'VRay encodes refraction intensity in Refraction Color brightness (no separate Amount in most VRay versions). RS has a dedicated Transmission Weight float. See Refraction Color note above.' },
    { vray:'Refraction Glossiness', type:'float', rs:'(no direct equivalent)',
      tag:'na',
      notes:'VRay controls refraction blur independently from reflection blur. RS Standard Material has no separate refraction roughness slider — frosted/blurry refraction is not natively supported in the Standard Material. Use a separate RS scatter setup or consider VRayFastSSS2 for translucency.' },
    { vray:'Refraction IOR',      type:'float', rs:'IOR (Transmission)',
      tag:'exact',
      notes:'Direct equivalent. Water=1.33, glass=1.5, diamond=2.4. Note: RS uses a single IOR for both Fresnel reflection strength and refraction bending. VRay can decouple these independently.' },
    { vray:'Fog Color',           type:'color', rs:'Depth Color (Absorption)',
      tag:'manual',
      notes:'Both describe volumetric absorption color inside the material. VRay applies it via Beer-Lambert law over Fog Depth distance. RS uses Depth Color with Transmission Depth. Same concept, different unit conventions — match visually per object size.' },
    { vray:'Depth (cm)',          type:'float', rs:'Transmission Depth',
      tag:'manual',
      notes:'Distance over which the absorption color is fully applied. VRay: Fog Depth in cm. RS: Transmission Depth in scene units. Match then tune visually.' },
    { vray:'Affect Shadows',      type:'bool',  rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Casts colored transparent shadows based on refraction/fog color (fake caustics). RS has no per-material shadow color — accurate caustics require enabling caustics globally in RS render settings.' },
    { vray:'Thin-Walled',         type:'bool',  rs:'Thin Walled',
      tag:'exact',
      notes:'Direct equivalent. Both treat the surface as an infinitely thin shell — no refraction offset, no volumetric absorption. Suitable for glass windows, soap bubbles, leaves.' },
    { vray:'Dispersion',          type:'bool',  rs:'Abbe Number (0=disabled)',
      tag:'manual',
      notes:'VRay requires a Dispersion enable checkbox before the Abbe value takes effect. RS controls dispersion solely via the Abbe Number — 0 disables it. Converting: VRay Dispersion off=RS Abbe 0; Dispersion on=transfer the Abbe value directly.' },
    { vray:'Dispersion Abbe',     type:'float', rs:'Abbe Number',
      tag:'exact',
      notes:'Direct equivalent. Lower=stronger dispersion (wider spectral spread). Glass typical: 50–65. Diamond: ~18.' },
    { vray:'Max Depth (Refraction)', type:'int', rs:'Max Trace Depth (Refraction)',
      tag:'exact',
      notes:'Maximum refraction ray bounces. VRay: Refraction Advanced. RS: Optimizations > Refraction > enable Trace Depth Override. Direct equivalent.' },
    { vray:'(no equivalent)',     type:'—',     rs:'Scatter Color',
      tag:'na',
      notes:'RS-only. Color of volumetric forward-scattering inside transmissive materials. VRayMtl has no separate scatter color — volumetric scattering color derives from Fog Color. For anisotropic volumetric scattering in VRay, use VRayVolumeMtl.' },
    { vray:'(no equivalent)',     type:'—',     rs:'Scatter Anisotropy',
      tag:'na',
      notes:'RS-only. Henyey-Greenstein phase function coefficient for volumetric scattering directionality (+1=forward, −1=backward). VRayMtl uses isotropic scattering only. Use VRayVolumeMtl for phase control in VRay.' },
  ]},

  { id:'sss', title:'Translucency / SSS', rows:[
    { vray:'Translucency Mode',   type:'enum',  rs:'Subsurface Mode',
      tag:'manual',
      notes:'VRay: None / Volumetric / SSS. RS: Point-Based Diffusion / Ray-Traced Diffusion / Random Walk. Not 1:1 enums. Closest: VRay SSS → RS Random Walk (most accurate, recommended). VRay Volumetric → RS Ray-Traced Diffusion. VRay None → RS Subsurface Weight 0. VRay SSS/Volumetric requires GI with ≥16 bounces.' },
    { vray:'SSS Amount',          type:'float', rs:'Subsurface Weight',
      tag:'exact',
      notes:'Both blend between surface diffuse and SSS effect. 0=no SSS, 1=full SSS. Direct mapping.' },
    { vray:'SSS Color',           type:'color', rs:'Subsurface Color',
      tag:'exact',
      notes:'Overall SSS tint color. Direct equivalent.' },
    { vray:'Scatter Radius',      type:'color', rs:'Subsurface Radius',
      tag:'exact',
      notes:'Per-RGB-channel scatter distance. Both allow independent R/G/B for realistic skin. VRay in cm, RS in scene units — align unit conventions before transferring values.' },
    { vray:'Scale (cm)',          type:'float', rs:'Subsurface Scale',
      tag:'exact',
      notes:'Global scale multiplier on scatter radius. Direct equivalent.' },
    { vray:'Translucency Color',  type:'color', rs:'(blend into Subsurface Color)',
      tag:'manual',
      notes:'VRay additional tint on top of Fog Color specifically for the SSS effect. RS has no separate SSS tint layer — composite VRay Fog Color × Translucency Color and map the result to RS Subsurface Color.' },
    { vray:'Illumination Method', type:'enum',  rs:'(no equivalent)',
      tag:'na',
      notes:'VRay Volumetric mode: Uniform (skin) or Directional (scatters toward light source). RS has no equivalent per-material illumination method — RS Random Walk handles scattering directionality physically without an artist switch.' },
  ]},

  { id:'sheen', title:'Sheen', rows:[
    { vray:'Amount (Sheen)',      type:'float', rs:'Sheen Weight',
      tag:'exact',
      notes:'Direct equivalent. Controls sheen/velvet layer intensity.' },
    { vray:'Sheen Color',         type:'color', rs:'Sheen Color',
      tag:'exact',
      notes:'Direct equivalent.' },
    { vray:'Sheen Glossiness',    type:'float', rs:'Sheen Roughness',
      tag:'invert',
      notes:'Opposite conventions. VRay: 1.0=all light reaches diffuse (no sheen), lower=glossier. RS: 0=tightest sheen, higher=more diffuse. Formula below.',
      formula:'RS Sheen Roughness = 1 − VRay Sheen Glossiness' },
  ]},

  { id:'bump', title:'Bump / Normal / Displacement', rows:[
    { vray:'Map Type',            type:'enum',  rs:'Normal Type',
      tag:'exact',
      notes:'Both expose: Bump Map (greyscale), Normal map in tangent space, Normal map in object space, Normal map in world space. Direct mapping for all standard types. VRay additionally has Screen Space and Explicit Normal — no RS equivalents for those two.' },
    { vray:'Map (Bump)',          type:'tex',   rs:'Bump Map',
      tag:'exact',
      notes:'Direct texture connection. Verify flip-R/flip-G channel orientation between bakers — C4D/RS and Maya baking conventions may differ for tangent-space normals.' },
    { vray:'Bump Mult',           type:'float', rs:'(control via upstream map)',
      tag:'manual',
      notes:'VRay explicit bump multiplier. RS has no dedicated Bump Mult — control strength via the map level or an upstream RS color correction node.' },
    { vray:'Bump Delta Scale',    type:'float', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Sharpens or blurs the bump effect independently of the map. Greyscale bump only. No RS equivalent.' },
    { vray:'Resolution-Independent Bump', type:'bool', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay-only. Ensures consistent bump appearance regardless of camera distance or render resolution. No RS equivalent.' },
    { vray:'(VRayDisplacementMod)', type:'tex', rs:'Displacement',
      tag:'manual',
      notes:'RS Displacement is a material-level slot in the Standard Material. VRay displacement is a separate VRayDisplacementMod modifier applied to the mesh — it is not part of VRayMtl. Converting RS→VRay: create a VRayDisplacementMod on the mesh and transfer the map and amount values. RS midpoint 0.5 = VRay shift 0.0.' },
  ]},

  { id:'advanced', title:'Advanced / Options', rows:[
    { vray:'Cutoff Threshold',    type:'float', rs:'(render-level setting)',
      tag:'manual',
      notes:'VRay per-material threshold below which reflection/refraction rays are not traced. RS equivalent is the global Unified Sampling threshold in render settings — cannot be set per material in RS.' },
    { vray:'Shading Model (V-Ray / OpenPBR)', type:'enum', rs:'(no equivalent)',
      tag:'na',
      notes:'VRay allows switching between V-Ray and OpenPBR shading models per material (renames several parameters). RS Standard Material uses a fixed PBR model. Use V-Ray shading model for cleanest RS mapping — OpenPBR parameter names will not match.' },
    { vray:'(no equivalent)',     type:'—',     rs:'Ray Type Intensity Multipliers',
      tag:'na',
      notes:'RS-only. Per-component (Diffuse/Reflection/Transmission/Sheen/Coat) multipliers per ray type (Primary/Reflection/Refraction/GI/Shadow). VRayMtl has no material-level ray type control — set equivalent visibility overrides at the object level via VRay Object Properties.' },
  ]},

];

// ─────────────────────────────────────────────────────────────────────────────
// APP STATE & RENDERING
// ─────────────────────────────────────────────────────────────────────────────

let dir           = 'vr';   // 'vr' = VRay→RS, 'rs' = RS→VRay
let activeFilters = new Set();

function setDir(d) {
  dir = d;
  document.getElementById('btn-vr').classList.toggle('active', d === 'vr');
  document.getElementById('btn-rs').classList.toggle('active', d === 'rs');

  const srcColor = d === 'vr' ? 'var(--vray)' : 'var(--rs)';
  const tgtColor = d === 'vr' ? 'var(--rs)'   : 'var(--vray)';
  const srcLabel = d === 'vr' ? 'VRayMtl'     : 'RS Standard Material';
  const tgtLabel = d === 'vr' ? 'RS Standard Material' : 'VRayMtl';
  const srcThLabel = d === 'vr' ? 'VRay Parameter' : 'RS Parameter';
  const tgtThLabel = d === 'vr' ? 'RS Equivalent'  : 'VRay Equivalent';

  document.querySelectorAll('.nav-dot').forEach(el => el.style.background = srcColor);
  document.querySelectorAll('.nav-btn.active').forEach(el => el.style.borderLeftColor = srcColor);

  const lSrc = document.getElementById('lbl-src');
  const lTgt = document.getElementById('lbl-tgt');
  lSrc.textContent = srcLabel;
  lSrc.className = 'shader-id ' + (d === 'vr' ? 'vray' : 'rs');
  lTgt.textContent = tgtLabel;
  lTgt.className = 'shader-id ' + (d === 'vr' ? 'rs' : 'vray');

  document.querySelectorAll('.th-src').forEach(th => { th.style.color = srcColor; th.textContent = srcThLabel; });
  document.querySelectorAll('.th-tgt').forEach(th => { th.style.color = tgtColor; th.textContent = tgtThLabel; });

  // Swap cell colors
  document.querySelectorAll('.param-row').forEach(row => {
    row.querySelector('.col-src').className = 'col-src ' + (d === 'vr' ? 'vray-color' : 'rs-color');
    row.querySelector('.col-tgt').className = 'col-tgt ' + (d === 'vr' ? 'rs-color' : 'vray-color');
    // Swap cell text content
    const srcCell = row.querySelector('.col-src');
    const tgtCell = row.querySelector('.col-tgt');
    const tmp = srcCell.textContent;
    srcCell.textContent = tgtCell.textContent;
    tgtCell.textContent = tmp;
  });

  applyFilters();
}

function buildNav() {
  const nav = document.getElementById('nav-links');
  SECTIONS.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.dataset.section = sec.id;
    btn.onclick = () => scrollToSection(sec.id);
    btn.innerHTML = `<span class="nav-dot"></span>${sec.title}<span class="nav-count">${sec.rows.length}</span>`;
    nav.appendChild(btn);
  });
}

function buildStats() {
  const all = SECTIONS.flatMap(s => s.rows);
  const c = tag => all.filter(r => r.tag === tag).length;
  document.getElementById('s-total').textContent  = `${all.length} parameters total`;
  document.getElementById('s-exact').textContent  = `${c('exact')} exact`;
  document.getElementById('s-invert').textContent = `${c('invert')} invert (1−x)`;
  document.getElementById('s-manual').textContent = `${c('manual')} manual`;
  document.getElementById('s-na').textContent     = `${c('na')} no equivalent`;
}

function buildTable() {
  let html = '';
  SECTIONS.forEach(sec => {
    html += `<div class="section" id="sec-${sec.id}">
      <div class="section-hdr" onclick="toggleSection(this)">
        <span class="section-title">${sec.title}</span>
        <span class="section-count">${sec.rows.length}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="section-body">
        <table class="param-table">
          <thead><tr>
            <th class="th-src" style="color:var(--vray)">VRay Parameter</th>
            <th class="th-type">Type</th>
            <th class="th-tgt" style="color:var(--rs)">RS Equivalent</th>
            <th class="th-notes">Conversion Notes</th>
          </tr></thead><tbody>`;
    sec.rows.forEach(row => {
      let noteHtml = `<span class="tag tag-${row.tag}">${row.tag}</span>${row.notes}`;
      if (row.formula) noteHtml += `<br><span class="formula">${row.formula}</span>`;
      html += `<tr class="param-row" data-tag="${row.tag}"
          data-vray="${row.vray.toLowerCase()}"
          data-rs="${row.rs.toLowerCase()}"
          data-notes="${row.notes.toLowerCase()}">
        <td class="col-src vray-color">${row.vray}</td>
        <td class="col-type">${row.type}</td>
        <td class="col-tgt rs-color">${row.rs}</td>
        <td class="col-notes">${noteHtml}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  document.getElementById('table-wrap').innerHTML = html;
}

function toggleSection(hdr) {
  hdr.closest('.section').classList.toggle('collapsed');
}

function toggleFilter(tag) {
  if (activeFilters.has(tag)) activeFilters.delete(tag);
  else activeFilters.add(tag);
  document.getElementById('f-' + tag).classList.toggle('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.section').forEach(sec => {
    let any = false;
    sec.querySelectorAll('.param-row').forEach(row => {
      const matchSearch = !q || row.dataset.vray.includes(q) || row.dataset.rs.includes(q) || row.dataset.notes.includes(q);
      const matchFilter = activeFilters.size === 0 || activeFilters.has(row.dataset.tag);
      const show = matchSearch && matchFilter;
      row.classList.toggle('hidden', !show);
      if (show) any = true;
    });
    sec.style.display = any ? '' : 'none';
  });
}

function scrollToSection(id) {
  const el = document.getElementById('sec-' + id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-section="${id}"]`).classList.add('active');
  }
}

function updateNavHighlight() {
  const wrap = document.getElementById('table-wrap');
  let current = null;
  document.querySelectorAll('.section').forEach(sec => {
    if (sec.offsetTop - wrap.scrollTop < 60) current = sec.id.replace('sec-', '');
  });
  if (current) {
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.section === current);
    });
  }
}

document.getElementById('table-wrap').addEventListener('scroll', updateNavHighlight);

buildNav();
buildStats();
buildTable();
updateNavHighlight();
</script>
</body>
</html>
